<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SOSmoto</title>
<meta name="description" content="SOSmoto conecta motociclistas con talleres y tiendas de confianza." />
<style>
* { box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #F5F5F7;
  margin: 0;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 32px 16px;
}
.card {
  width: 100%;
  max-width: 420px;
  background: #FFFFFF;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 8px 28px rgba(26,26,46,0.12);
  text-align: center;
  padding: 48px 28px;
}
.brand {
  color: #FF6B00;
  font-weight: 700;
  font-size: 28px;
  letter-spacing: 0.2px;
  margin: 0 0 12px;
}
.tagline {
  color: #1A1A2E;
  font-size: 15px;
  line-height: 22px;
  margin: 0 0 28px;
}
.button {
  display: inline-block;
  background: #FF6B00;
  color: #fff;
  font-weight: 700;
  font-size: 15px;
  text-decoration: none;
  padding: 14px 28px;
  border-radius: 24px;
}
</style>
</head>
<body>
<div class="card">
  <p class="brand">SOSmoto</p>
  <p class="tagline">Conectamos motociclistas con talleres y tiendas de confianza, y auxilio en carretera cuando lo necesitas.</p>
  <a class="button" href="sosmoto://">Abrir en SOSmoto</a>
</div>
</body>
</html>
